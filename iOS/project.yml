name: Groomkit
options:
  bundleIdPrefix: com.shimondeitel.groomkit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Groomkit:
    type: application
    platform: iOS
    sources:
      - path: Groomkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groomkit
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Groomkit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GroomkitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GroomkitTests
      - path: Groomkit.storekit
    dependencies:
      - target: Groomkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groomkit.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GroomkitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GroomkitUITests
    dependencies:
      - target: Groomkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groomkit.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Groomkit:
    build:
      targets:
        Groomkit: all
        GroomkitTests: [test]
        GroomkitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Groomkit.storekit
    test:
      config: Debug
      storeKitConfiguration: Groomkit.storekit
      targets:
        - GroomkitTests
        - GroomkitUITests
    archive:
      config: Release
